services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db


  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
      EMAIL_USE_TLS: "false"
      DEFAULT_FROM_EMAIL: MumAid <noreply@mumaid.local>

  celery:
    build: .
    command: celery -A mumaid worker --loglevel=info
    depends_on:
      - redis
      - db
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
      EMAIL_USE_TLS: "false"
      DEFAULT_FROM_EMAIL: MumAid <noreply@mumaid.local>

volumes:
  postgres_data:
