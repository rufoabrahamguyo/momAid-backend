name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements/dev.txt"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Black formatting check
        run: black --check api manage.py

      - name: Ruff lint check
        run: ruff check api manage.py
        
  test:
    name: Test Suite
    needs: lint
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: momaid
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements/dev.txt"

      - name: Create virtual environment
      

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: mumaid.settings.test
          PYTHONPATH: api
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          POSTGRES_DB: momaid
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          CLOUDINARY_CLOUD_NAME: mock
          CLOUDINARY_CLOUD_API_KEY: mock
          CLOUDINARY_CLOUD_API_SECRET: mock
          ANONYMOUS_SALT: ci-mock-salt
        run: pytest api/apps/accounts/tests/ -v --tb=short

  deploy:
    name: Deploy to Render
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy webhook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"