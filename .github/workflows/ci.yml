name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements/dev.txt"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Black formatting check
        run: black --check api manage.py

      - name: Ruff lint check
        run: ruff check api manage.py

  test:
    name: Test Suite
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env << EOF
          SECRET_KEY=ci-test-secret-key-not-used-in-prod-12345
          POSTGRES_DB=momaid
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          REDIS_URL=redis://redis:6379/0
          CLOUDINARY_CLOUD_NAME=mock
          CLOUDINARY_CLOUD_API_KEY=mock
          CLOUDINARY_CLOUD_API_SECRET=mock
          ANONYMOUS_SALT=ci-mock-salt
          DJANGO_SETTINGS_MODULE=mumaid.settings.test
          EOF

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Build dev image
        run: docker compose build api

      - name: Start db and redis
        run: docker compose up -d db redis

      - name: Wait for postgres
        run: |
          echo "Waiting for postgres..."
          until docker compose exec -T db pg_isready -U postgres; do
            sleep 2
          done

      - name: Start api
        run: docker compose up -d api

      - name: Run tests
        run: docker compose exec -T api pytest api/apps/accounts/tests/ -v --tb=short

      - name: Teardown
        if: always()
        run: docker compose down -v


  deploy:
    name: Deploy to Render
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy webhook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"