name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      # v6 exposes pooled URL as db_url_pooled (not db_url_with_pooler).
      db_url_pooled: ${{ steps.create_neon_branch.outputs.db_url_pooled }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Map db_url to POSTGRES_* (Django prod settings)
        run: |
          python3 << 'EOF'
          import os
          from urllib.parse import urlparse, unquote

          raw = (os.environ.get("DB_URL") or "").strip()
          if not raw:
              raise SystemExit(
                  "DB_URL is empty. For neondatabase/create-branch-action@v6 use "
                  "outputs.db_url_pooled or db_url."
              )
          if raw.startswith("postgresql://"):
              raw = "postgres://" + raw[len("postgresql://") :]
          p = urlparse(raw)
          user = unquote(p.username or "")
          password = unquote(p.password or "")
          host = p.hostname or ""
          port = p.port or 5432
          name = (p.path or "/").lstrip("/").split("?", 1)[0]

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"POSTGRES_USER={user}\n")
              f.write(f"POSTGRES_PASSWORD={password}\n")
              f.write(f"POSTGRES_HOST={host}\n")
              f.write(f"POSTGRES_PORT={port}\n")
              f.write(f"POSTGRES_NAME={name}\n")
          EOF
        env:
          
          DB_URL: ${{ steps.create_neon_branch.outputs.db_url_pooled || steps.create_neon_branch.outputs.db_url }}

      - name: Migrate preview database
        env:
          DJANGO_ENV: prod
          SECRET_KEY: ci-not-for-production
          ALLOWED_HOSTS: localhost,127.0.0.1
          POSTGRES_SSL_REQUIRE: "True"
        run: python manage.py migrate --noinput

      # Uncomment and add job permissions (contents: read, pull-requests: write) to post schema diff on the PR:
      # - name: Post Schema Diff Comment to PR
      #   uses: neondatabase/schema-diff-action@v1
      #   with:
      #     project_id: ${{ vars.NEON_PROJECT_ID }}
      #     compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
      #     api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
